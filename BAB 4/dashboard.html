<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard BizBalance</title>
  <link rel="stylesheet" href="css/dashboardstyle.css">
  <script>
    function updateUserName() {
      const userName = prompt("Masukkan Nama Anda:");
      if (userName) {
        sessionStorage.setItem("userName", userName);
        document.querySelector(".profil").textContent = userName;
        document.querySelector(".dashboard h1").textContent = `Selamat Datang ${userName} di BizBalance`;
      }
    }
    function loadUserName() {
      const storedName = sessionStorage.getItem("userName");
      if (storedName) {
        document.querySelector(".profil").textContent = storedName;
        document.querySelector(".dashboard h1").textContent = `Selamat Datang ${storedName} di BizBalance`;
      }
    }
    window.onload = loadUserName;
  </script>
</head>
<body>
  <header>
    <div class="logo">
      <img src="Gambar/logo.png" alt="Logo BizBalance">
      <span>BizBalance</span>
    </div>
    <nav>
      <ul>
        <li><a href="riwayat.html"><img src="Gambar/riwayat.png" alt="" class="nav-logo">Riwayat</a></li>
        <li><a href="laporan.html"><img src="Gambar/laporan.png" alt="" class="nav-logo">Laporan</a></li>
      </ul>
    </nav>
    <div class="profil" onclick="updateUserName()">User</div>
  </header>

  <div class="dashboard">
    <h1>Selamat Datang di BizBalance</h1>
  </div>

  <div class="kartu-container">
    <div class="kartu">
      <h2></h2>
      <img class="chart" src="" alt="">
    </div>

    <div class="kartu">
      <h2></h2>
      <img class="chart" src="" alt="">
    </div>

    <div class="kartu">
      <h2></h2>
      <div class="diagram-lingkaran" scr="" alt=""></div>
    </div>
  </div>
  <footer>
    <p>© 2024 BizBalance. All Rights Reserved.</p>
  </footer>
</body>
</html>
